version: 2

project_name: checkpointz

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - make build-web
builds:
  - env:
      - CGO_ENABLED=0
    binary: checkpointz-{{.Version}}
    goos:
      - linux
      - windows
      - darwin

    goarch:
      - amd64
      - arm64
    goarm:
      - 6
      - 7
    ignore:
      - goarch: 386
    ldflags:
      - -s -w -X github.com/ethpandaops/checkpointz/pkg/version.Release={{.Tag}} -X github.com/ethpandaops/checkpointz/pkg/version.GitCommit={{.ShortCommit}}
    mod_timestamp: "{{ .CommitTimestamp }}"
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

dockers_v2:
  ## Scratch
  - id: scratch
    dockerfile: goreleaser-scratch.Dockerfile
    images:
      - "ethpandaops/{{ .ProjectName }}"
    tags:
      - "{{ .Version }}"
      - "{{ if .Env.RELEASE_SUFFIX }}{{ .Env.RELEASE_SUFFIX }}-{{ end }}latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"

  ## Debian
  - id: debian
    dockerfile: goreleaser-debian.Dockerfile
    images:
      - "ethpandaops/{{ .ProjectName }}"
    tags:
      - "{{ .Version }}-debian"
      - "{{ if .Env.RELEASE_SUFFIX }}{{ .Env.RELEASE_SUFFIX }}-{{ end }}debian-latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
